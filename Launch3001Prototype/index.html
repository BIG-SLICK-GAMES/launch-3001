<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Launch 3001 Prototype</title>
    <style>
      html,
      body,
      #game {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #080b14;
      }

      body {
        font-family: Arial, sans-serif;
      }

      #tuning-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
        width: min(280px, calc(100vw - 32px));
        padding: 12px 14px;
        border: 1px solid rgba(125, 242, 255, 0.35);
        border-radius: 8px;
        background: rgba(5, 8, 14, 0.72);
        color: #f3f7ff;
        box-sizing: border-box;
        backdrop-filter: blur(8px);
      }

      .tuning-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
        font-size: 13px;
      }

      .tuning-row:last-child {
        margin-bottom: 0;
      }

      .tuning-row input {
        grid-column: 1 / -1;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="tuning-panel" aria-label="Rocket tuning controls"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
