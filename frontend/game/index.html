<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Launch 3001 Prototype</title>
    <style>
      html,
      body,
      #game {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #080b14;
      }

      body {
        font-family: Arial, sans-serif;
        position: fixed;
        inset: 0;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      #rotate-lock {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 20;
        place-items: center;
        background: radial-gradient(circle at 50% 40%, rgba(33, 50, 58, 0.94), rgba(5, 8, 14, 0.98));
        color: #f3f7ff;
        text-align: center;
        font-size: 20px;
        letter-spacing: 0;
        padding: 32px;
        box-sizing: border-box;
      }

      #touch-controls {
        position: fixed;
        inset: 0;
        z-index: 12;
        pointer-events: none;
      }

      .screen-control {
        position: absolute;
        bottom: max(18px, env(safe-area-inset-bottom));
        width: 92px;
        height: 92px;
        border: 3px solid currentColor;
        border-radius: 50%;
        background: rgba(5, 8, 14, 0.76);
        color: #f3f7ff;
        font: 700 15px/1 Arial, sans-serif;
        letter-spacing: 0;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.72);
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .screen-control:active,
      .screen-control.is-active {
        transform: translateY(2px) scale(0.97);
      }

      #tilt-control {
        left: max(18px, env(safe-area-inset-left));
        color: #5ee7ff;
      }

      #boost-control {
        right: max(18px, env(safe-area-inset-right));
        color: #ffb84d;
      }

      #tilt-status {
        position: absolute;
        left: max(18px, env(safe-area-inset-left));
        bottom: calc(max(18px, env(safe-area-inset-bottom)) + 98px);
        width: 140px;
        color: #f3f7ff;
        font: 13px/1.2 Arial, sans-serif;
        text-align: center;
        text-shadow: 0 2px 6px #05080e;
        pointer-events: none;
      }

      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-lock {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="touch-controls" aria-label="Touch controls">
      <button id="tilt-control" class="screen-control" type="button">TILT</button>
      <div id="tilt-status">tap tilt to steer</div>
      <button id="boost-control" class="screen-control" type="button">BOOST</button>
    </div>
    <div id="rotate-lock">Turn your phone sideways</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
